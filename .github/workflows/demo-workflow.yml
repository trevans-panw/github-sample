name: github-pipeline-001
permissions:
  id-token: write # This is required for requesting the JWT 
  contents: read  # This is required for checkout
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    workflow_dispatch:
    inputs:
      # Optional inputs can be defined to prompt for information
      environment:
        description: 'Target environment'
        type: choice
        required: true
        options:
          - development
          - staging
          - production
      version_tag:
        description: 'Version tag to deploy'
        type: string
        required: false
        default: 'latest'

jobs:
  run-manual-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run task with inputs
        run: |
          echo "Workflow triggered manually by ${{ github.actor }}"
          echo "Deploying to ${{ github.event.inputs.environment }}"
          echo "Deploying version ${{ github.event.inputs.version_tag }}"
  
  fetch-secret-from-conjur:
    runs-on: ubuntu-latest
    steps:
      - name: Import Secrets using CyberArk Conjur Secret Fetcher
        uses: cyberark/conjur-action@v2.0.12
        with:
          url: ${{ vars.CONJUR_URL }}
          account: ${{ vars.CONJUR_ACCOUNT }}
          authn_id: ${{ vars.CONJUR_AUTHN_ID }}
          secrets: data/vault/demo-github/github-app01/username|SECRET1;data/vault/demo-github/github-app01/password|SECRET2
      - name : Echo USERNAME
        run: echo $SECRET1 | sed 's/./& /g'
      - name : Echo PASSWORD
        run: echo $SECRET2 | sed 's/./& /g'


